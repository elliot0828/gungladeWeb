<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GunGlade Team & Links</title>
    <style>
        @font-face {
            font-family: "Mako-ExtraBold";
            src: url("https://db.onlinewebfonts.com/t/df94624f0397569bcdfd601a7fa8e0f8.eot");
            src: url("https://db.onlinewebfonts.com/t/df94624f0397569bcdfd601a7fa8e0f8.eot?#iefix")format("embedded-opentype"),
            url("https://db.onlinewebfonts.com/t/df94624f0397569bcdfd601a7fa8e0f8.woff2")format("woff2"),
            url("https://db.onlinewebfonts.com/t/df94624f0397569bcdfd601a7fa8e0f8.woff")format("woff"),
            url("https://db.onlinewebfonts.com/t/df94624f0397569bcdfd601a7fa8e0f8.ttf")format("truetype"),
            url("https://db.onlinewebfonts.com/t/df94624f0397569bcdfd601a7fa8e0f8.svg#Mako-ExtraBold")format("svg");
        }
        body {
            margin: 0;
            padding: 0;
            font-family: "Mako-ExtraBold", sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('bg2.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(15px);
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .logo {
            width: 80%;
            height: auto;
            margin: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 65, 65, 0.3));
        }

        h2.subTitle { 
            font-size: 1.1rem;
            margin-top: 20px;
            margin-bottom: 12px;
            color: #aaa; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border-left: 4px solid #ff4141;
            padding-left: 12px;
            font-family: 'Courier', Courier, monospace;
            text-align: left;
        }

        .team-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            flex-direction: column;
            align-items: start
        }

        .team-role { 
            font-size: 0.65rem; 
            color: #ff4141; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .team-name { 
            font-size: 1.1rem;
            font-family: 'Courier', Courier, monospace;
        }

        .link-group { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px; 
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
        }

        /* 스팀 다운로드 버튼 전용 스타일 */
        .btn-steam {
            border: 1px solid #ff4141;
            background: rgba(255, 65, 65, 0.1);
        }
        .btn-steam:hover {
            background: #ff4141;
            color: white;
        }

        .studio-group {
            margin-top: 8px;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            .link-group { grid-template-columns: 1fr; }
            .studio-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="title2.png" alt="Gun Glade Logo" class="logo">

    <h2 class="subTitle">Team Members</h2>
    <div class="team-grid">
        <div class="team-card">
            <span class="team-role">Developer & Director</span>
            <span class="team-name">PlayerIGN</span>
        </div>
        <div class="team-card">
            <span class="team-role">Website</span>
            <span class="team-name">Byoungyun Kim</span>
        </div>
    </div>

    <h2 class="subTitle">Download</h2>
    <div style="margin-bottom: 20px;">
        <a href="https://store.steampowered.com/app/2448920/Gun_Glade/" class="btn btn-steam" target="_blank">Play on Steam</a>
    </div>

    <h2 class="subTitle">Official Links</h2>
    <div class="link-group">
        <a href="https://dsc.gg/gunglade" class="btn" target="_blank">Discord</a>
        <a href="https://x.com/GunGlade" class="btn" target="_blank">Twitter</a>
        <a href="https://www.youtube.com/@GunGlade" class="btn" target="_blank">YouTube</a>
    </div>

    <h2 class="subTitle">Studio & Devs</h2>
    <div class="link-group studio-group">
        <a href="https://x.com/autodidactgames" class="btn" target="_blank">Autodidact Games</a>
        <a href="https://x.com/Player_KDA" class="btn" target="_blank">Player_KDA</a>
    </div>
</div>

</body>
</html>
