
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GunGlade OS</title>
    <style>
        @font-face {
            font-family: "Mako-ExtraBold";
            src: url("https://db.onlinewebfonts.com/t/df94624f0397569bcdfd601a7fa8e0f8.woff2") format("woff2");
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 배경화면 */
        .desktop {
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url('bg2.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* macOS 윈도우 스타일 */
        .window {
            width: 90%;
            max-width: 450px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transform: scale(0.8);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: absolute;
            z-index: 10;
        }

        .window.active {
            transform: scale(1);
            opacity: 1;
            visibility: visible;
        }

        /* 윈도우 상단 바 (Traffic Lights) */
        .window-header {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .buttons {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        /* 내부 콘텐츠 (기존 스타일 유지) */
        .window-content {
            padding: 20px 30px;
            max-height: 70vh;
            overflow-y: auto;
            color: white;
            font-family: "Mako-ExtraBold", sans-serif;
        }

        .logo { width: 70%; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255, 65, 65, 0.3)); }
        h2.subTitle { 
            font-size: 1rem; margin: 20px 0 10px; color: #ff4141; 
            text-transform: uppercase; letter-spacing: 2px;
            border-left: 3px solid #ff4141; padding-left: 10px;
        }
        .team-grid { display: grid; gap: 8px; margin-bottom: 15px; }
        .team-card { 
            background: rgba(255, 255, 255, 0.05); padding: 10px 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .team-role { font-size: 0.6rem; color: #aaa; text-transform: uppercase; }
        .team-name { font-size: 1rem; font-family: 'Courier', monospace; display: block; }
        
        .link-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 8px; border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; text-decoration: none; font-size: 0.7rem; transition: 0.3s;
        }
        .btn:hover { background: white; color: black; }

        /* 하단 Dock */
        .dock-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .dock-item {
            width: 50px;
            height: 50px;
            margin: 0 8px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.47, 0, 0.745, 0.715);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dock-item:hover {
            transform: scale(1.5) translateY(-10px);
        }

        .dock-icon {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
        }

        .dock-dot {
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            margin-top: 5px;
            opacity: 0;
        }
        .window.active ~ .dock-container .dock-dot { opacity: 1; }

        /* 반응형 */
        @media (max-width: 480px) {
            .link-group { grid-template-columns: 1fr; }
            .dock-item { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

<div class="desktop">
    
    <div class="window" id="infoWindow">
        <div class="window-header">
            <div class="buttons">
                <div class="dot red" onclick="toggleWindow()"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
        </div>
        <div class="window-content">
            <center><img src="title2.png" alt="Gun Glade Logo" class="logo"></center>

            <h2 class="subTitle">Team Members</h2>
            <div class="team-grid">
                <div class="team-card">
                    <span class="team-role">Developer & Director</span>
                    <span class="team-name">PlayerIGN</span>
                </div>
    
                <div class="team-card">
                    <span class="team-role">Website</span>
                    <span class="team-name">Byoungyun Kim</span>
                </div>
            </div>

            <h2 class="subTitle">Official Links</h2>
            <div class="link-group">
                <a href="https://dsc.gg/gunglade" class="btn" target="_blank">Discord</a>
                <a href="https://x.com/GunGlade" class="btn" target="_blank">Twitter</a>
                <a href="https://www.youtube.com/@GunGlade" class="btn" target="_blank">YouTube</a>
            </div>

            <h2 class="subTitle">Studio & Devs</h2>
            <div class="link-group" style="grid-template-columns: 1fr 1fr;">
                <a href="https://x.com/autodidactgames" class="btn" target="_blank">Autodidact</a>
                <a href="https://x.com/Player_KDA" class="btn" target="_blank">Player_KDA</a>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock-item" onclick="toggleWindow()">
            <div class="dock-icon">G</div>
            <div class="dock-dot" id="activeDot"></div>
        </div>
        <div class="dock-item"><div class="dock-icon" style="background: #4285F4; color:white;">W</div></div>
        <div class="dock-item"><div class="dock-icon" style="background: #34A853; color:white;">S</div></div>
    </div>

</div>

<script>
    function toggleWindow() {
        const win = document.getElementById('infoWindow');
        const dot = document.getElementById('activeDot');
        
        if (win.classList.contains('active')) {
            win.classList.remove('active');
            dot.style.opacity = "0";
        } else {
            win.classList.add('active');
            dot.style.opacity = "1";
        }
    }
</script>

</body>
</html>
